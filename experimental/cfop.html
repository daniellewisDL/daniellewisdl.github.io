<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFOP Mobile Timer</title>
    <style>
        /* FONT IMPORT */
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        /* RESET & BASIC SETUP */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #0c0c0c; 
            color: #ffffff;
            font-family: 'Roboto Mono', monospace;
            overflow: hidden; 
            user-select: none; 
            touch-action: manipulation; 
        }

        #app-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            cursor: pointer;
        }

        /* SCRAMBLE SECTION */
        #scramble {
            margin-top: 20px;
            font-size: 16px;
            color: #aaaaaa;
            text-align: center;
            letter-spacing: 2px;
            line-height: 1.5;
            max-width: 90%;
            min-height: 48px; /* Prevents jumping if scramble wraps */
        }

        /* MAIN BIG TIMER */
        #main-timer-display {
            font-size: 20vw; 
            font-weight: 400;
            margin: auto 0; 
            transition: color 0.2s ease;
        }

        /* SPLITS SECTION - 2x2 Grid */
        #splits-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 30px 40px; 
            width: 100%;
            max-width: 350px; 
            margin-bottom: 30px;
        }

        .split-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%; 
        }

        .split-label {
            font-size: 11px;
            font-weight: 700;
            color: #555555;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .split-time {
            font-size: 32px;
            color: #555555; 
            font-weight: 400;
        }

        /* HISTORY SECTION */
        #history-container {
            margin-bottom: 25px;
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        #history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 10px;
        }

        .history-label {
            font-size: 10px;
            font-weight: 700;
            color: #444444;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #clear-btn {
            background: none;
            border: 1px solid #333;
            color: #777;
            font-family: 'Roboto Mono', monospace;
            font-size: 9px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
        }

        #clear-btn:active {
            background: #333;
            color: #fff;
        }

        #history-list {
            font-size: 16px;
            color: #aaaaaa;
            letter-spacing: 2px;
            min-height: 20px; 
        }

        /* DYNAMIC COLORS */
        .color-active { color: #4dff88 !important; } 
        .color-done { color: #ffffff !important; }   
        .color-wait { color: #ff4d4d !important; }   
        .color-muted { color: #555555 !important; }  

        /* FOOTER INSTRUCTIONS */
        #instructions {
            margin-bottom: 10px;
            font-size: 10px;
            color: #444444;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <div id="app-container">
        <div id="scramble">Loading Scramble...</div>

        <div id="main-timer-display">0.00</div>

        <div id="splits-container">
            <div class="split-item">
                <div class="split-label">CROSS</div>
                <div class="split-time" id="split-time-0">0.00</div>
            </div>
            <div class="split-item">
                <div class="split-label">F2L</div>
                <div class="split-time" id="split-time-1">0.00</div>
            </div>
            <div class="split-item">
                <div class="split-label">OLL</div>
                <div class="split-time" id="split-time-2">0.00</div>
            </div>
            <div class="split-item">
                <div class="split-label">PLL</div>
                <div class="split-time" id="split-time-3">0.00</div>
            </div>
        </div>

        <div id="history-container">
            <div id="history-header">
                <div class="history-label">Last 5 Solves</div>
                <button id="clear-btn">CLEAR</button>
            </div>
            <div id="history-list">- - - - -</div>
        </div>

        <div id="instructions">HOLD TO START - TAP TO SPLIT</div>
    </div>

    <script>
        // --- Variables ---
        let state = 'IDLE'; 
        let startTime;
        let timerInterval;
        let currentStage = 0; 
        let stageTimes = [0, 0, 0, 0]; 
        let holdTimeout;
        let solveHistory = []; 

        // --- DOM Elements ---
        const container = document.getElementById('app-container');
        const mainDisplay = document.getElementById('main-timer-display');
        const scrambleDisplay = document.getElementById('scramble');
        const historyList = document.getElementById('history-list');
        const clearBtn = document.getElementById('clear-btn');
        const splitElements = [
            document.getElementById('split-time-0'),
            document.getElementById('split-time-1'),
            document.getElementById('split-time-2'),
            document.getElementById('split-time-3')
        ];

        // --- Scramble Generator ---
        function generateScramble() {
            const faces = ['R', 'L', 'U', 'D', 'F', 'B'];
            const modifiers = ["", "'", "2"];
            let scramble = [];
            let lastFace = -1;
            let secondLastFace = -1;

            for (let i = 0; i < 21; i++) {
                let face;
                // Prevent same face twice in a row, and prevent R L R patterns
                do {
                    face = Math.floor(Math.random() * 6);
                } while (face === lastFace || (Math.floor(face / 2) === Math.floor(lastFace / 2) && face === secondLastFace)); 
                
                let mod = modifiers[Math.floor(Math.random() * 3)];
                scramble.push(faces[face] + mod);
                
                secondLastFace = lastFace;
                lastFace = face;
            }
            return scramble.join(' ');
        }

        function updateScramble() {
            scrambleDisplay.textContent = generateScramble();
        }

        // --- Helper Functions ---
        function formatTime(ms) {
            return (ms / 1000).toFixed(2);
        }

        function updateMainDisplay(ms) {
            mainDisplay.textContent = formatTime(ms);
        }

        function updateHistoryUI() {
            if (solveHistory.length === 0) {
                historyList.textContent = "- - - - -";
            } else {
                historyList.textContent = solveHistory.join(" • ");
            }
        }

        function updateSplitUI() {
            for (let i = 0; i < 4; i++) {
                const element = splitElements[i];
                let segmentDuration = 0;
                
                if (state !== 'IDLE' && state !== 'HOLDING' && state !== 'READY') {
                     if (i === 0) {
                         segmentDuration = stageTimes[0];
                     } else {
                         segmentDuration = stageTimes[i] - stageTimes[i-1];
                     }
                     
                     if (i <= currentStage || stageTimes[i] > 0) {
                         element.textContent = formatTime(Math.max(0, segmentDuration));
                     } else {
                         element.textContent = "0.00";
                     }
                } else {
                     element.textContent = "0.00";
                }

                element.classList.remove('color-active', 'color-done', 'color-muted');
                if (state === 'RUNNING') {
                    if (i === currentStage) element.classList.add('color-active'); 
                    else if (i < currentStage) element.classList.add('color-done'); 
                    else element.classList.add('color-muted'); 
                } else if (state === 'ENDED') {
                     element.classList.add('color-done');
                } else {
                    element.classList.add('color-muted');
                }
            }
        }

        // --- Timer Logic ---
        function startTimer() {
            state = 'RUNNING';
            startTime = Date.now();
            currentStage = 0;
            stageTimes = [0,0,0,0];
            updateSplitUI();
            mainDisplay.classList.remove('color-active', 'color-wait', 'color-done'); 

            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                updateMainDisplay(elapsed);
            }, 30);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            state = 'ENDED';
            const finalTime = Date.now() - startTime;
            
            if(stageTimes[3] === 0) stageTimes[3] = finalTime;
            
            updateMainDisplay(finalTime);
            updateSplitUI();
            
            solveHistory.push(formatTime(finalTime));
            if (solveHistory.length > 5) {
                solveHistory.shift(); 
            }
            updateHistoryUI();
            updateScramble(); // Generate new scramble for next solve
        }

        function recordSplit() {
            const cumulativeTime = Date.now() - startTime;
            stageTimes[currentStage] = cumulativeTime;
            
            if (currentStage < 3) {
                currentStage++;
                updateSplitUI();
            } else {
                stopTimer();
            }
        }

        function reset() {
            clearInterval(timerInterval);
            state = 'IDLE';
            currentStage = 0;
            stageTimes = [0, 0, 0, 0];
            updateMainDisplay(0);
            updateSplitUI();
            mainDisplay.className = ''; 
        }

        // --- Interaction Handlers ---
        function handlePressStart(e) {
            // Ignore if clicking the clear button
            if (e.target.tagName === 'BUTTON') return;
            
            if(e.cancelable && e.type === 'touchstart') e.preventDefault();

            if (state === 'IDLE' || state === 'ENDED') {
                if(state === 'ENDED') reset();
                
                state = 'HOLDING';
                mainDisplay.classList.add('color-wait'); 

                holdTimeout = setTimeout(() => {
                    if (state === 'HOLDING') {
                        state = 'READY';
                        mainDisplay.classList.remove('color-wait');
                        mainDisplay.classList.add('color-active'); 
                    }
                }, 300);

            } else if (state === 'RUNNING') {
                recordSplit();
            }
        }

        function handlePressEnd(e) {
            if (e.target.tagName === 'BUTTON') return;

            if(e.cancelable && e.type === 'touchend') e.preventDefault();
            clearTimeout(holdTimeout); 

            if (state === 'READY') {
                startTimer();
            } else if (state === 'HOLDING') {
                mainDisplay.classList.remove('color-wait');
                state = 'IDLE';
            }
        }

        // Clear History Button
        clearBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Double check to prevent bubbling
            solveHistory = [];
            updateHistoryUI();
        });

        // Listeners
        container.addEventListener('touchstart', handlePressStart, { passive: false });
        container.addEventListener('touchend', handlePressEnd, { passive: false });
        container.addEventListener('mousedown', handlePressStart);
        container.addEventListener('mouseup', handlePressEnd);

        // Init
        reset();
        updateHistoryUI();
        updateScramble();

    </script>
</body>
</html>
