    <title>sketch-template</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>body { background-color: rgb(0, 0, 0); font-family: monospace; border-width: 0; margin:0; padding:0; overflow: hidden;}</style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/2.0.5/p5.min.js" integrity="sha512-jOTg6ikYiHx1LvbSOucnvZi4shXbaovZ91+rfViIiUFLgAJK+k1oQtGEaLvDB8rsZwEfUksTgmhrxdvEDykuzQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- <script src="../p5/p5.min.js"></script> -->
  </head>

  <body>
	<div id="canvas"></div>
    <script>

      let width = window.innerWidth
      let height = window.innerHeight
			let initialMargin = 0.9
      let squareWidth = Math.min(width,height)*initialMargin

      let settingsSets = [
        {
          circAroundPercent: Math.random() * 0.5 + 0.5,
          circOfScreenPercent: Math.random() * 0.2 + 0.6,
          numCircs: Math.floor(Math.random() * 100) + 20,
          loopFactor: Math.random() * 0.5 + 3,
          timerIncrement: Math.PI*2*(Math.random() * 0.1 + 0.005),
          arcLengthMult: Math.random() * 0.5 + 0.1,
          arcStrokeWeight: Math.floor(Math.random() * 8) + 1,
          drawBaseArcs: Math.random() < 0.5,
          bgAlpha: Math.floor(Math.random() * 255)
        },

      ]

      let settingsIndex = Math.floor(Math.random() * settingsSets.length)
      settingsIndex = 0
      let circAroundPercent = settingsSets[settingsIndex].circAroundPercent
      let circOfScreenPercent = settingsSets[settingsIndex].circOfScreenPercent
      let numCircs = settingsSets[settingsIndex].numCircs
      let loopFactor = settingsSets[settingsIndex].loopFactor
      let timerIncrement = settingsSets[settingsIndex].timerIncrement
      let startAngle = Math.PI/2 + (1-circAroundPercent)/2 * Math.PI*2
      let endAngle = Math.PI/2 - (1-circAroundPercent)/2 * Math.PI*2
      let timerMax = Math.PI*2 * circAroundPercent
      let arcStrokeColors = ["red","orange","yellow","green","blue","indigo","violet","white","gray","cyan","magenta","pink","lime","teal","brown","salmon","gold","silver","maroon","navy","olive","aqua","fuchsia"]
      let arcStrokeColor = Math.floor(Math.random() * arcStrokeColors.length)
      let arcStrokeWeight = settingsSets[settingsIndex].arcStrokeWeight
      let drawBaseArcs = settingsSets[settingsIndex].drawBaseArcs
      
      let arcLength = settingsSets[settingsIndex].arcLengthMult * Math.PI*2 * circAroundPercent

      let arcs = []
      for (let i = 0; i < numCircs; i++) {
        arcs.push({
          x: width/2,
          y: height/2,
          r: (Math.min(width,height)/2)*circOfScreenPercent*(i+1)/numCircs,
          startangle: startAngle,
          endangle: endAngle
          
        })
      }

      let timers = []
      for (let i = 0; i < numCircs; i++) {
        timers.push(0)
      }

  
      preload = () => {
        
      }

			setup = () => {
        createCanvas(width, height)
        pixelDensity(1)
        background(0)
        // saveGif('./myGif.gif', 420, {units: "frames"})
			}

			draw = () => {

        background(0,settingsSets[settingsIndex].bgAlpha)

        noFill()
        stroke("white")
        strokeWeight(1)
        rect(width/2-squareWidth/2,height/2-squareWidth/2,squareWidth,squareWidth)


        if (drawBaseArcs) {
          stroke("gray")
          strokeWeight(1)
          for (let i = 0; i < arcs.length; i++) {
            arc(arcs[i].x, arcs[i].y, arcs[i].r*2, arcs[i].r*2, arcs[i].startangle, arcs[i].endangle)
          }
        }

        stroke(arcStrokeColors[arcStrokeColor])
        strokeWeight(arcStrokeWeight)

        for (let i = 0; i < arcs.length; i++) {
          // arc(arcs[i].x, arcs[i].y, arcs[i].r*2, arcs[i].r*2, startAngle, startAngle + timers[i])
          arc(arcs[i].x, arcs[i].y, arcs[i].r*2, arcs[i].r*2, (timers[i] < arcLength) ? startAngle : (startAngle + timers[i] - arcLength), startAngle + timers[i])
          
          timers[i] += timerIncrement / (i+1)*loopFactor
          if (timers[i] >= timerMax) {
            timers[i] = 0
          }
          
          
        }

        // noLoop()
        // frameRate(3)


  
      }

    </script>
  </body>
</html>
