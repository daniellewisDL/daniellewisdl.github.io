<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-SIBs Racing Bar Chart</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            margin: 20px;
        }
        svg {
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .bar-label {
            font-size: 14px;
            fill: #333;
            text-anchor: end;
            dominant-baseline: central;
            pointer-events: none;
        }
        .value-label {
            font-size: 14px;
            fill: #fff;
            text-anchor: end;
            dominant-baseline: central;
            pointer-events: none;
        }
        .axis-label {
            font-size: 12px;
        }
        .year-ticker {
            font-size: 80px;
            font-weight: bold;
            fill: #ccc;
            text-anchor: end;
        }
        .chart-title {
            font-size: 24px;
            font-weight: bold;
            text-anchor: middle;
        }
         .chart-subtitle {
            font-size: 18px;
            fill: #555;
            text-anchor: middle;
        }
    </style>
</head>
<body>

<h1>Global Systemically Important Banks (G-SIBs) Ranking by Total Exposure</h1>
<div id="chart"></div>

<script>
    async function drawRacingBarChart() {
        // --- 1. Configuration & Setup ---
        const nBars = 12; // Number of bars to display
        const transitionDuration = 500; // Milliseconds for transition
        const pauseDuration = 1000; // Milliseconds to pause on each year

        const margin = { top: 60, right: 10, bottom: 10, left: 10 };
        const width = 800 - margin.left - margin.right;
        const height = 600 - margin.top - margin.bottom;

        const svg = d3.select("#chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // --- 2. Data Loading & Preprocessing ---
        const rawData = await d3.csv("gsibs.csv");

        const data = rawData.map(d => ({
            name: d.name.trim(),
            country: d.countryName.trim(),
            year: +d.year,
            value: d.tei.trim() === '-' || d.tei.trim() === '' ? 0 : +d.tei,
        })).filter(d => d.value > 0);
        
        const years = Array.from(d3.group(data, d => d.year).keys()).sort();

        // --- 3. Scales & Axes ---
        const x = d3.scaleLinear().range([0, width]);
        const y = d3.scaleBand().range([0, height]).padding(0.1);

        const colorScale = d3.scaleOrdinal(d3.schemeTableau10);
        
        const xAxis = d3.axisTop(x)
            .ticks(5)
            .tickSize(-height)
            .tickFormat(d => d3.format("~s")(d));

        const gx = svg.append("g")
            .attr("class", "x-axis")
            .style("stroke-dasharray", ("3, 3"));

        // --- 4. Chart Elements ---
        const yearTicker = svg.append("text")
            .attr("class", "year-ticker")
            .attr("x", width)
            .attr("y", height - 20)
            .attr("dy", "0.25em")
            .text(years[0]);
        
        svg.append("text")
             .attr("class", "chart-title")
             .attr("x", width / 2)
             .attr("y", -30)
             .text("Total Exposure Indicator (in Billions)");

        // --- 5. Animation Loop ---
        async function runYear(year) {
            const yearData = data.filter(d => d.year === year);
            
            // Get top N banks for the current year
            const rankedData = yearData.sort((a, b) => b.value - a.value).slice(0, nBars);
            
            // Update scales
            x.domain([0, d3.max(rankedData, d => d.value)]);
            y.domain(rankedData.map(d => d.name)).padding(0.1);

            colorScale.domain(Array.from(new Set(data.map(d => d.country))));
            
            // Update X axis
            gx.transition()
              .duration(transitionDuration)
              .ease(d3.easeLinear)
              .call(xAxis);

            // Create a data join for the bars
            const bars = svg.selectAll("rect.bar")
                .data(rankedData, d => d.name);

            bars.enter()
                .append("rect")
                .attr("class", "bar")
                .attr("y", d => y(d.name))
                .attr("height", y.bandwidth())
                .attr("fill", d => colorScale(d.country))
                .attr("x", 0)
                .attr("width", 0)
                .transition()
                .duration(transitionDuration)
                .ease(d3.easeLinear)
                .attr("width", d => x(d.value));

            bars.transition()
                .duration(transitionDuration)
                .ease(d3.easeLinear)
                .attr("y", d => y(d.name))
                .attr("width", d => x(d.value));

            bars.exit()
                .transition()
                .duration(transitionDuration)
                .ease(d3.easeLinear)
                .attr("width", 0)
                .remove();

            // Data join for bank name labels
            const labels = svg.selectAll("text.bar-label")
                .data(rankedData, d => d.name);

            labels.enter()
                .append("text")
                .attr("class", "bar-label")
                .attr("y", d => y(d.name) + y.bandwidth() / 2)
                .attr("x", -5)
                .text(d => `${d.name} (${d.country})`)
              .transition()
                .duration(transitionDuration)
                .ease(d3.easeLinear)
                .attr("y", d => y(d.name) + y.bandwidth() / 2);
            
            labels.transition()
                .duration(transitionDuration)
                .ease(d3.easeLinear)
                .attr("y", d => y(d.name) + y.bandwidth() / 2);
                
            labels.exit().remove();

            // Data join for value labels on the bars
            const valueLabels = svg.selectAll("text.value-label")
                .data(rankedData, d => d.name);
            
            valueLabels.enter()
                .append("text")
                .attr("class", "value-label")
                .attr("x", d => x(d.value) - 10)
                .attr("y", d => y(d.name) + y.bandwidth() / 2)
                .text(d => d3.format(",.0f")(d.value / 1e9) + 'B')
              .transition()
                .duration(transitionDuration)
                .ease(d3.easeLinear)
                .attr("x", d => x(d.value) - 10)
                .attr("y", d => y(d.name) + y.bandwidth() / 2);
                
            valueLabels.transition()
                .duration(transitionDuration)
                .ease(d3.easeLinear)
                .attr("x", d => x(d.value) - 10)
                .tween("text", function(d) {
                    const i = d3.interpolate(this.textContent.replace(/[,B]/g, ""), d.value / 1e9);
                    return function(t) {
                        this.textContent = d3.format(",.0f")(i(t)) + 'B';
                    };
                });

            valueLabels.exit()
              .transition()
                .duration(transitionDuration)
                .ease(d3.easeLinear)
                .attr("x", 0)
                .remove();


            // Update year ticker
            yearTicker.text(year);
        }

        for (const year of years) {
            runYear(year);
            await new Promise(resolve => setTimeout(resolve, transitionDuration + pauseDuration));
        }
    }

    drawRacingBarChart();
</script>

</body>
</html>
